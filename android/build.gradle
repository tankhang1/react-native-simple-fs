plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.filesystem'
version = '0.1.0'

android {
  namespace "expo.modules.filesystem"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "androidx.activity:activity-ktx:1.10.1"
}
